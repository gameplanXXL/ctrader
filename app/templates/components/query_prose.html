{#
  query_prose(prose_text)
  Story 4.2 — human-readable headline for the current facet selection.

  Prose is computed server-side via `app/services/query_prose.py` and
  passed in as a plain string.
#}
{% macro query_prose(prose_text) %}
<p class="query-prose" role="status" aria-live="polite">{{ prose_text }}</p>
{% endmacro %}

<style>
  .query-prose {
    margin: 0 0 var(--space-2);
    font-size: var(--font-size-small);
    color: var(--text-muted);
    font-style: italic;
    letter-spacing: 0.02em;
  }
</style>
